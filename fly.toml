app = "chalbeat-payroll"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/payroll.db"
  FRONTEND_DIST = "/app/frontend/dist"

[[mounts]]
  source = "payroll_data"
  destination = "/data"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443